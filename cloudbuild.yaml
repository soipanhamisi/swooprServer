steps:
  # 1. Build the container image using Google Cloud Buildpacks
  - name: 'gcr.io/k8s-skaffold/pack'
    args:
      - 'build'
      - 'europe-west1-docker.pkg.dev/swoopr/cloud-run-source-deploy/swooprserver/swooprserver:$COMMIT_SHA'
      - '--builder=gcr.io/buildpacks/builder:v1'

  # 2. Deploy the built container to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'swooprserver'
      - '--image'
      - 'europe-west1-docker.pkg.dev/swoopr/cloud-run-source-deploy/swooprserver/swooprserver:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'

# THIS IMPLEMENTS RULE (C)
options:
  logging: CLOUD_LOGGING_ONLY